<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICG</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

.hero {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
    padding: 100px 0;
}

.feature-icon {
    font-size: 40px;
    color: #2563eb;
}

.section-padding {
    padding: 80px 0;
}

.footer {
    background: #111827;
    color: white;
    padding: 40px 0;
}

.btn-primary-custom {
    background-color: #2563eb;
    border: none;
}

.btn-primary-custom:hover {
    background-color: #1e40af;
}
body {
    font-family: 'Inter', sans-serif;
    padding-top: 80px; /* prevents navbar overlap */
}

</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>


<!-- Flash Messages (Floating, Non-breaking Layout) -->
<div class="position-fixed top-0 start-50 translate-middle-x mt-4"
     style="z-index: 1080; width: 100%; max-width: 600px;">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                
                <div class="alert alert-{{ category }} alert-dismissible fade show shadow"
                     role="alert"
                     style="border-radius: 12px; font-size: 0.95rem;">
                     
                    {{ message }}

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                            aria-label="Close">
                    </button>

                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

</div>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
<div class="container">
    <a class="navbar-brand fw-bold text-primary" href="/">AICG</a>
    <div>
        <a href="/courses" class="btn btn-outline-primary me-2">Courses</a>
        <a href="/login" class="btn btn-outline-primary me-2">Login</a>
        <a href="/register" class="btn btn-primary-custom text-white">Get Started</a>
    </div>
</div>


<!-- Message -->
 
</nav>
<!-- Flash Messages -->

</body>
