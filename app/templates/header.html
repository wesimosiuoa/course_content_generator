<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICG</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
}

.hero {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
    padding: 100px 0;
}

.feature-icon {
    font-size: 40px;
    color: #2563eb;
}

.section-padding {
    padding: 80px 0;
}

.footer {
    background: #111827;
    color: white;
    padding: 40px 0;
}

.btn-primary-custom {
    background-color: #2563eb;
    border: none;
}

.btn-primary-custom:hover {
    background-color: #1e40af;
}
body {
    font-family: 'Inter', sans-serif;
    padding-top: 80px; /* prevents navbar overlap */
}

/* Global Loading Overlay */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
}

.loading-overlay.active {
    display: flex;
}

/* Spinner Styles */
.spinner-container {
    text-align: center;
}

.spinner-border-lg {
    width: 4rem;
    height: 4rem;
    border-width: 0.5rem;
}

.loading-text {
    margin-top: 20px;
    font-size: 1.1rem;
    color: #2563eb;
    font-weight: 600;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

/* Button Loading State */
.btn-loading {
    pointer-events: none;
    opacity: 0.7;
    position: relative;
}

.btn-loading::after {
    content: '';
    position: absolute;
    width: 1rem;
    height: 1rem;
    top: 50%;
    left: 50%;
    margin-left: -0.5rem;
    margin-top: -0.5rem;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: button-spinner 0.6s linear infinite;
}

@keyframes button-spinner {
    to { transform: rotate(360deg); }
}

/* Page Section Loader */
.page-loader {
    display: none;
    text-align: center;
    padding: 60px 20px;
}

.page-loader.active {
    display: block;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Global Loading Overlay -->
<div id="globalLoader" class="loading-overlay">
    <div class="spinner-container">
        <div class="spinner-border text-primary spinner-border-lg" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <div class="loading-text" id="loadingText">Generating your personalized content...</div>
    </div>
</div>

<script>
// Global loading functions
function showLoader(message) {
    const loader = document.getElementById('globalLoader');
    const text = document.getElementById('loadingText');
    if (message) {
        text.textContent = message;
    }
    loader.classList.add('active');
}

function hideLoader() {
    const loader = document.getElementById('globalLoader');
    loader.classList.remove('active');
}

// Auto-hide flash messages after 5 seconds
document.addEventListener('DOMContentLoaded', function() {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert) {
        setTimeout(function() {
            alert.classList.remove('show');
            alert.classList.add('fade');
            setTimeout(function() {
                alert.remove();
            }, 150);
        }, 5000);
    });
});
</script>


<!-- Flash Messages (Floating, Non-breaking Layout) -->
<div class="position-fixed top-0 start-50 translate-middle-x mt-4"
     style="z-index: 1080; width: 100%; max-width: 600px;">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                
                <div class="alert alert-{{ category }} alert-dismissible fade show shadow"
                     role="alert"
                     style="border-radius: 12px; font-size: 0.95rem;">
                     
                    {{ message }}

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert"
                            aria-label="Close">
                    </button>

                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

</div>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
<div class="container">
    <a class="navbar-brand fw-bold text-primary" href="/">AICG</a>
    <div>
        <a href="/courses" class="btn btn-outline-primary me-2">Courses</a>
        <a href="/login" class="btn btn-outline-primary me-2">Login</a>
        <a href="/register" class="btn btn-primary-custom text-white">Get Started</a>
    </div>
</div>


<!-- Message -->
 
</nav>
<!-- Flash Messages -->

</body>
